[build]
  publish = "frontend/dist"
  command = "cd frontend && yarn install --frozen-lockfile && yarn build:web"

[build.environment]
  NODE_VERSION = "22"
  EXPO_PUBLIC_BACKEND_URL = "https://match-quota-analyzer.emergent.host"

[[redirects]]
  from = "/predict"
  to = "/.netlify/functions/predict"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
