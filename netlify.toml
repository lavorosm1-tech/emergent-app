[build]
  publish = "frontend/dist"
  command = "cd frontend && yarn install --frozen-lockfile && yarn build:web"

[build.environment]
  NODE_VERSION = "22"
  EXPO_PUBLIC_BACKEND_URL = "https://match-quota-analyzer.emergent.host"

[[redirects]]
  from = "/predict"
  to = "/.netlify/functions/predict"
  status = 200

[[redirects]]
  from = "/matches-list"
  to = "/.netlify/functions/matches-list"
  status = 200

[[redirects]]
  from = "/matches-days"
  to = "/.netlify/functions/matches-days"
  status = 200

[[redirects]]
  from = "/match-detail"
  to = "/.netlify/functions/match-detail"
  status = 200

[[redirects]]
  from = "/match-result"
  to = "/.netlify/functions/match-result"
  status = 200

[[redirects]]
  from = "/upload-excel"
  to = "/.netlify/functions/upload-excel"
  status = 200

[[redirects]]
  from = "/upload-skipped"
  to = "/.netlify/functions/upload-skipped"
  status = 200

[[redirects]]
  from = "/ai-predict"
  to = "/.netlify/functions/ai-predict"
  status = 200

[[redirects]]
  from = "/llm-settings"
  to = "/.netlify/functions/llm-settings"
  status = 200

[[redirects]]
  from = "/budget"
  to = "/.netlify/functions/budget"
  status = 200

[[redirects]]
  from = "/ml-stats"
  to = "/.netlify/functions/ml-stats"
  status = 200

[[redirects]]
  from = "/selection-update"
  to = "/.netlify/functions/selection-update"
  status = 200

[[redirects]]
  from = "/selected-list"
  to = "/.netlify/functions/selected-list"
  status = 200

[[redirects]]
  from = "/selection-clear"
  to = "/.netlify/functions/selection-clear"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
