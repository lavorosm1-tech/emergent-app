[build]
  publish = "frontend/dist"
  command = "cd frontend && yarn install --frozen-lockfile && yarn build:web"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/predict"
  to = "/.netlify/functions/predict"
  status = 200

[[redirects]]
  from = "/matches-list"
  to = "/.netlify/functions/matches-list"
  status = 200

[[redirects]]
  from = "/matches-days"
  to = "/.netlify/functions/matches-days"
  status = 200

[[redirects]]
  from = "/match-detail"
  to = "/.netlify/functions/match-detail"
  status = 200

[[redirects]]
  from = "/match-result"
  to = "/.netlify/functions/match-result"
  status = 200

[[redirects]]
  from = "/upload-excel"
  to = "/.netlify/functions/upload-excel"
  status = 200

[[redirects]]
  from = "/upload-skipped"
  to = "/.netlify/functions/upload-skipped"
  status = 200

[[redirects]]
  from = "/ai-predict"
  to = "/.netlify/functions/ai-predict"
  status = 200

[[redirects]]
  from = "/llm-settings"
  to = "/.netlify/functions/llm-settings"
  status = 200

[[redirects]]
  from = "/budget"
  to = "/.netlify/functions/budget"
  status = 200

[[redirects]]
  from = "/ml-stats"
  to = "/.netlify/functions/ml-stats"
  status = 200

[[redirects]]
  from = "/selection-update"
  to = "/.netlify/functions/selection-update"
  status = 200

[[redirects]]
  from = "/selected-list"
  to = "/.netlify/functions/selected-list"
  status = 200

[[redirects]]
  from = "/selection-clear"
  to = "/.netlify/functions/selection-clear"
  status = 200

[[redirects]]
  from = "/export-db"
  to = "/.netlify/functions/export-db"
  status = 200

[[redirects]]
  from = "/import-db"
  to = "/.netlify/functions/import-db"
  status = 200

[[redirects]]
  from = "/delete-all"
  to = "/.netlify/functions/delete-all"
  status = 200

[[redirects]]
  from = "/match-candidates"
  to = "/.netlify/functions/match-candidates"
  status = 200

[[redirects]]
  from = "/match-history"
  to = "/.netlify/functions/match-history"
  status = 200

[[redirects]]
  from = "/results-apply"
  to = "/.netlify/functions/results-apply"
  status = 200

[[redirects]]
  from = "/results-bulk"
  to = "/.netlify/functions/results-bulk"
  status = 200

[[redirects]]
  from = "/stats-scores"
  to = "/.netlify/functions/stats-scores"
  status = 200

[[redirects]]
  from = "/stats-reset"
  to = "/.netlify/functions/stats-reset"
  status = 200

[[redirects]]
  from = "/aistudio-prompt"
  to = "/.netlify/functions/aistudio-prompt"
  status = 200

[[redirects]]
  from = "/results-fetch"
  to = "/.netlify/functions/results-fetch"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
